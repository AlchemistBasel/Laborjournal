function haptic(pattern){
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

function mountAlea(root) {
  let isFree = false;
  let rollsLeft, chosenBase, chosenAromas, chosenShow;
  let gameState = 'intro'; // intro | wheel | tarot | d4 | finale

  // ── Helper: make a screen div ──────────────────────────────────
  function screen(id, content) {
    const d = document.createElement('div');
    d.className = 'al-screen';
    d.id = 'al-' + id;
    d.innerHTML = content;
    root.appendChild(d);
    return d;
  }

  // Akt-Fortschritt (I · II · III) — einmalig an die Ritual-Bühne hängen
  (function ensureActs() {
    const stage = document.getElementById('ritualStage');
    if (!stage || document.getElementById('al-acts')) return;
    const a = document.createElement('div');
    a.className = 'al-acts'; a.id = 'al-acts';
    a.innerHTML =
      '<span class="al-act" data-act="1">I</span>' +
      '<span class="al-act-line"></span>' +
      '<span class="al-act" data-act="2">II</span>' +
      '<span class="al-act-line"></span>' +
      '<span class="al-act" data-act="3">III</span>';
    stage.appendChild(a);
  })();
  function updateActs(id) {
    const map = { wheel: 1, tarot: 2, d4: 3 };
    const cur = map[id] || 0;            // intro/finale → ausgeblendet
    const wrap = document.getElementById('al-acts');
    if (!wrap) return;
    wrap.style.opacity = cur ? '1' : '0';
    wrap.querySelectorAll('.al-act').forEach(el => {
      const n = +el.dataset.act;
      el.classList.toggle('active', n === cur);
      el.classList.toggle('done', n < cur);
    });
  }

  function show(id) {
    alScreen = id;
    root.querySelectorAll('.al-screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('al-' + id);
    if (el) setTimeout(() => el.classList.add('active'), 20);
    updateActs(id);
  }
  let alScreen = 'intro';

  // ── Screen 0: Intro ───────────────────────────────────────────
  screen('intro', '');
  function buildIntro() {
    const s = document.getElementById('al-intro');
    if (!s) return;
    s.innerHTML = `
    <div class="al-eyebrow">${alL().introEyebrow}</div>
    <div class="al-title">ALEA IACTA EST</div>
    <div class="al-subtitle">${alL().introSub}</div>
    <div class="al-intro-price">${alL().introPrice}</div>
    <div class="al-rule"></div>
    <div class="al-toggle" id="al-toggle-wrap">
      <span class="al-toggle-label">${alL().toggleLabel}</span>
      <div class="al-toggle-track${isFree ? ' on' : ''}" id="al-toggle" onclick="alToggle()">
        <div class="al-toggle-thumb"></div>
      </div>
      <span class="al-toggle-label" id="al-toggle-state">${isFree ? alL().yes : alL().no}</span>
    </div>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style="margin-bottom:18px;opacity:0.7;">
      <circle cx="32" cy="32" r="30" stroke="#6B5800" stroke-width="0.6" stroke-dasharray="4 3"/>
      <circle cx="32" cy="32" r="22" stroke="#B8960C" stroke-width="0.4" opacity="0.5"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#6B5800" stroke-width="0.3"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#6B5800" stroke-width="0.3"/>
      <line x1="10" y1="10" x2="54" y2="54" stroke="#6B5800" stroke-width="0.3"/>
      <line x1="54" y1="10" x2="10" y2="54" stroke="#6B5800" stroke-width="0.3"/>
      <circle cx="32" cy="32" r="4" stroke="#D4AF37" stroke-width="0.6" opacity="0.8"/>
      <circle cx="32" cy="32" r="1.5" fill="#D4AF37" opacity="0.7"/>
    </svg>
    <button class="al-btn primary" onclick="alStartWheel()" style="width:100%;">${alL().begin}</button>
    `;
  }
  buildIntro();

  window.alToggle = function() {
    isFree = !isFree;
    const tr = document.getElementById('al-toggle');
    const lb = document.getElementById('al-toggle-state');
    tr.classList.toggle('on', isFree);
    lb.textContent = isFree ? alL().yes : alL().no;
  };

  // ── Screen 1: Wheel ───────────────────────────────────────────
  screen('wheel', '');
  function buildWheel() {
    const s = document.getElementById('al-wheel');
    if (!s) return;
    s.innerHTML = `
    <div class="al-eyebrow">${alL().act1}</div>
    <div class="al-title">${alL().wheelTitle}</div>
    <div class="al-subtitle">${alL().wheelSub}</div>
    <div class="al-wheel-wrap" id="al-wheel-wrap">
      <canvas id="al-wheel-canvas" class="al-wheel-canvas" width="220" height="220"></canvas>
      <div class="al-wheel-needle"></div>
    </div>
    <div class="al-result-card${chosenBase ? ' show' : ''}" id="al-wheel-result">
      <div class="al-result-name" id="al-wheel-rname">${chosenBase ? baseName(chosenBase) : '—'}</div>
      <div class="al-result-note" id="al-wheel-rnote">${chosenBase ? baseNote(chosenBase) : '—'}</div>
    </div>
    <div class="al-reroll-info" id="al-wheel-rolls">
      ${alL().triesLeft}
      <span class="al-reroll-dot" id="al-wd0"></span>
      <span class="al-reroll-dot" id="al-wd1"></span>
      <span class="al-reroll-dot" id="al-wd2"></span>
    </div>
    <div class="al-btn-row">
      <button class="al-btn primary" id="al-wheel-spin-btn" onclick="alSpinWheel()" style="flex:1;">${chosenBase ? (rollsLeft>0?alL().again(rollsLeft):alL().noTries) : alL().spin}</button>
      <button class="al-btn" id="al-wheel-next-btn" onclick="alGoTarot()" ${chosenBase?'':'disabled'} style="flex:1;">${alL().next}</button>
    </div>`;
    if (chosenBase && rollsLeft<=0) document.getElementById('al-wheel-spin-btn').disabled = true;
    setRerollDots('al-wd', 3 - (rollsLeft === undefined ? 3 : rollsLeft));
    drawWheel();
    enableWheelDrag();
  }

  // ── Drag-to-Spin: der Gast dreht sein Schicksal selbst ─────────
  function enableWheelDrag() {
    const cv = document.getElementById('al-wheel-canvas');
    if (!cv || cv.dataset.dragWired) return;
    cv.dataset.dragWired = '1';
    cv.style.touchAction = 'none';
    cv.style.cursor = 'grab';
    let pts = [], dragging = false, moved = 0;

    function angOf(e) {
      const r = cv.getBoundingClientRect();
      return Math.atan2(e.clientY - (r.top + r.height / 2), e.clientX - (r.left + r.width / 2));
    }
    cv.addEventListener('pointerdown', function (e) {
      if (wheelSpinning) return;
      dragging = true; moved = 0;
      pts = [{ a: angOf(e), t: performance.now() }];
      try { cv.setPointerCapture(e.pointerId); } catch (err) {}
    });
    cv.addEventListener('pointermove', function (e) {
      if (!dragging || wheelSpinning) return;
      const a = angOf(e), now = performance.now();
      const last = pts[pts.length - 1];
      let d = a - last.a;
      if (d > Math.PI) d -= Math.PI * 2;
      if (d < -Math.PI) d += Math.PI * 2;
      wheelAngle += d; moved += Math.abs(d);
      drawWheel();
      pts.push({ a: a, t: now });
      if (pts.length > 6) pts.shift();
    });
    cv.addEventListener('pointerup', function () {
      if (!dragging) return;
      dragging = false;
      if (wheelSpinning) return;
      if (moved < 0.06) { alSpinWheel(); return; }   // blosses Tippen = normales Drehen
      // Winkelgeschwindigkeit aus den letzten Bewegungen
      let total = 0;
      for (let i = 1; i < pts.length; i++) {
        let d = pts[i].a - pts[i - 1].a;
        if (d > Math.PI) d -= Math.PI * 2;
        if (d < -Math.PI) d += Math.PI * 2;
        total += d;
      }
      const dt = Math.max(1, pts[pts.length - 1].t - pts[0].t);
      const vel = total / dt * 1000;                  // rad/s
      if (Math.abs(vel) < 1.0) { drawWheel(); return; } // zu sanft: Rad bleibt stehen
      const turns = Math.min(9, 2.5 + Math.abs(vel) * 0.55);
      alSpinWheel(Math.sign(vel) * turns * Math.PI * 2);
    });
    cv.addEventListener('pointercancel', function () { dragging = false; });
  }

  // ── Draw wheel ─────────────────────────────────────────────────
  let wheelAngle = 0;
  let wheelSpinning = false;

  function drawWheel() {
    const canvas = document.getElementById('al-wheel-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = 110, cy = 110, r = 104;
    const bases = isFree ? BASES_FREE : BASES_ALCOHOL;
    const n = bases.length;
    const sliceAngle = (Math.PI * 2) / n;

    ctx.clearRect(0, 0, 220, 220);

    // outer ring
    ctx.beginPath(); ctx.arc(cx, cy, r+2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(184,150,12,0.25)'; ctx.lineWidth = 1.2; ctx.stroke();

    bases.forEach((b, i) => {
      const start = wheelAngle + i * sliceAngle;
      const end   = start + sliceAngle;
      const mid   = start + sliceAngle / 2;

      // slice fill
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = i % 2 === 0 ? '#111' : '#0E0E0E';
      ctx.fill();
      ctx.strokeStyle = 'rgba(184,150,12,0.18)';
      ctx.lineWidth = 0.8;
      ctx.stroke();

      // label — Schrift in der unteren Radhälfte um 180° drehen, damit nichts auf dem Kopf steht
      ctx.save();
      ctx.translate(cx + Math.cos(mid) * (r * 0.65), cy + Math.sin(mid) * (r * 0.65));
      const norm = ((mid % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      let rot = norm + Math.PI / 2;
      if (norm > 0 && norm < Math.PI) rot += Math.PI;
      ctx.rotate(rot);
      ctx.fillStyle = '#D4AF37';
      ctx.font = '600 12px Cinzel, serif';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, 0, 0);
      ctx.restore();

      // tick mark
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(start) * (r - 8), cy + Math.sin(start) * (r - 8));
      ctx.lineTo(cx + Math.cos(start) * r,        cy + Math.sin(start) * r);
      ctx.strokeStyle = 'rgba(184,150,12,0.4)';
      ctx.lineWidth = 1; ctx.stroke();
    });

    // centre
    ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2);
    ctx.fillStyle = '#080808'; ctx.fill();
    ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#D4AF37'; ctx.fill();
  }

  function getWheelResult() {
    const bases = isFree ? BASES_FREE : BASES_ALCOHOL;
    const n = bases.length;
    const sliceAngle = (Math.PI * 2) / n;
    // needle points UP = -PI/2; find which slice is at top
    const normalised = (((-Math.PI/2) - wheelAngle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    const idx = Math.floor(normalised / sliceAngle) % n;
    return bases[idx];
  }

  window.alSpinWheel = function(signedSpin) {
    if (wheelSpinning) return;
    if (chosenBase && rollsLeft <= 0) return;       // keine Versuche mehr (auch via Rad-Tap)
    const firstSpin = !chosenBase;            // erster Wurf ist frei
    const bases = isFree ? BASES_FREE : BASES_ALCOHOL;
    // redraw in case isFree changed
    drawWheel();
    const spinBtn = document.getElementById('al-wheel-spin-btn');
    const nextBtn = document.getElementById('al-wheel-next-btn');
    const rc = document.getElementById('al-wheel-result');

    rc.classList.remove('show');
    wheelSpinning = true;
    spinBtn.disabled = true;

    // Drehbetrag: per Drag (Vorzeichen = Richtung) oder Standard-Zufall
    const delta = (typeof signedSpin === 'number')
      ? signedSpin
      : -(4 + Math.random() * 3) * Math.PI * 2;
    const duration = 2200;
    const startAngle = wheelAngle;
    const startTime = performance.now();
    const sliceAngle = (Math.PI * 2) / bases.length;
    let lastSeg = -1;

    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      // ease out cubic
      const ease = 1 - Math.pow(1 - t, 3);
      wheelAngle = startAngle + delta * ease;
      drawWheel();
      // Ratschen-Haptik pro Segmentgrenze
      const seg = Math.floor(((wheelAngle % (Math.PI*2)) + Math.PI*2) / sliceAngle);
      if (seg !== lastSeg) { if (lastSeg !== -1) haptic(6); lastSeg = seg; }
      if (t < 1) { requestAnimationFrame(animate); return; }

      wheelSpinning = false;
      chosenBase = getWheelResult();
      haptic(32);   // Rad stoppt

      // Reroll nur verbrauchen, wenn es kein erster Wurf war
      if (!firstSpin) rollsLeft = Math.max(0, rollsLeft - 1);
      setRerollDots('al-wd', 3 - rollsLeft);

      document.getElementById('al-wheel-rname').textContent = baseName(chosenBase);
      document.getElementById('al-wheel-rnote').textContent = baseNote(chosenBase);
      rc.classList.add('show');

      spinBtn.textContent = rollsLeft > 0 ? alL().again(rollsLeft) : alL().noTries;
      spinBtn.disabled = rollsLeft <= 0;
      nextBtn.disabled = false;
    }
    requestAnimationFrame(animate);
  };

  window.alStartWheel = function() {
    rollsLeft = 3;
    chosenBase = null;
    buildWheel();
    show('wheel');
  };

  window.alGoTarot = function() {
    if (!chosenBase) return;
    buildTarot();
    show('tarot');
  };

  // ── Screen 2: Tarot — 12 Karten, wähle 2 ──────────────────────
  // Jede Karte trägt ihr Aroma (von der physischen Karte). Gast wählt 2.
  // Beide gleiches Aroma (gleiche row) → kostenlos neu wählen (kein Abzug).
  // Sonst: Geschmackswelt = beide Aromen. Max. 3 bewusste Versuche (Neu mischen).
  let tarotSpread = [], tarotChosen = [], tarotAttemptsLeft = 3, tarotLocked = false;

  function shuffleArr(a) {
    a = a.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildTarot() {
    tarotAttemptsLeft = 3;
    layoutTarot();
  }

  // Neu mischen: neuer Spread + Auswahl zurücksetzen
  function layoutTarot() {
    tarotSpread = shuffleArr(TAROT_DECK).slice(0, 8);
    tarotChosen = [];
    tarotLocked = false;
    renderTarotScreen();
  }

  // Rendert den Screen aus dem aktuellen Zustand (erhält Auswahl — z. B. bei Sprachwechsel)
  function renderTarotScreen() {
    const s = document.getElementById('al-tarot');
    if (!s) return;
    s.innerHTML = `
      <div class="al-glow"></div>
      <div class="al-eyebrow">${alL().act2}</div>
      <div class="al-title">${alL().tarotTitle}</div>
      <div class="al-subtitle">${alL().tarotSub}</div>
      <div class="al-rule"></div>
      <div class="al-tarot-area" id="al-tarot-area">
        ${tarotSpread.map((c, i) => `
          <div class="al-card" id="al-tc-${i}" style="animation-delay:${(i * 0.04).toFixed(2)}s" onclick="alPickCard(${i})">
            <div class="al-card-inner">
              <div class="al-card-face al-card-back"></div>
              <div class="al-card-face al-card-front">
                <div class="al-card-symbol" style="color:${c.color};">${c.symbol}</div>
                <div class="al-card-cname">${cardName(c)}</div>
                <div class="al-card-cflavor">${cardFlavor(c)}</div>
              </div>
            </div>
          </div>`).join('')}
      </div>
      <div class="al-tarot-hint" id="al-tarot-hint">${alL().touchFirst}</div>
      <div class="al-aroma-duo">
        <div class="al-aroma-chip" id="al-aroma-0"><div class="ac-card">—</div><div class="ac-motto"></div><div class="ac-flavor">—</div></div>
        <div class="al-aroma-chip" id="al-aroma-1"><div class="ac-card">—</div><div class="ac-motto"></div><div class="ac-flavor">—</div></div>
      </div>
      <div class="al-reroll-info" id="al-tarot-rolls">
        ${alL().triesLeft}
        <span class="al-reroll-dot" id="al-td0"></span>
        <span class="al-reroll-dot" id="al-td1"></span>
        <span class="al-reroll-dot" id="al-td2"></span>
      </div>
      <div class="al-btn-row">
        <button class="al-btn" id="al-tarot-reroll" onclick="alRerollTarot()" disabled style="flex:1;">${alL().reshuffle}</button>
        <button class="al-btn primary" id="al-tarot-next" onclick="alGoD4()" disabled style="flex:1;">${alL().next}</button>
      </div>
    `;
    // Zustand wiederherstellen (gewählte Karten, Chips, Buttons)
    tarotChosen.forEach((idx, slot) => {
      const el = document.getElementById('al-tc-' + idx);
      if (el) el.classList.add('flipped', 'chosen');
      fillChip(slot, tarotSpread[idx]);
    });
    const hint = document.getElementById('al-tarot-hint');
    if (tarotChosen.length === 1) hint.textContent = alL().touchSecond;
    if (tarotChosen.length === 2 && tarotLocked) {
      hint.textContent = alL().revealed;
      tarotSpread.forEach((_, k) => {
        const el = document.getElementById('al-tc-' + k);
        if (el && !el.classList.contains('flipped')) el.classList.add('locked');
      });
      document.getElementById('al-tarot-next').disabled = false;
      const rr = document.getElementById('al-tarot-reroll');
      if (tarotAttemptsLeft > 0) { rr.disabled = false; rr.textContent = alL().reshuffleN(tarotAttemptsLeft); }
      else { rr.disabled = true; rr.textContent = alL().noReshuffle; }
    }
    updateTarotDots();
  }

  function updateTarotDots() {
    setRerollDots('al-td', 3 - tarotAttemptsLeft); // 3 Punkte = bis zu 3 Neu-Mischungen
  }

  function fillChip(slot, card) {
    const chip = document.getElementById('al-aroma-' + slot);
    if (!chip) return;
    chip.querySelector('.ac-card').textContent   = cardName(card);
    chip.querySelector('.ac-motto').textContent  = '« ' + cardMotto(card) + ' »';
    chip.querySelector('.ac-flavor').textContent = cardFlavor(card);
    chip.classList.add('show');
  }

  window.alPickCard = function(i) {
    if (tarotLocked || tarotChosen.length >= 2) return;
    const cardEl = document.getElementById('al-tc-' + i);
    if (!cardEl || cardEl.classList.contains('flipped')) return;

    cardEl.classList.add('flipped', 'chosen');
    haptic(14);   // Karte dreht sich um
    tarotChosen.push(i);
    const slot = tarotChosen.length - 1;
    const card = tarotSpread[i];
    setTimeout(() => fillChip(slot, card), 380);

    const hint = document.getElementById('al-tarot-hint');

    if (tarotChosen.length === 1) {
      hint.textContent = alL().touchSecond;
      return;
    }

    // zweite Karte gewählt → auswerten
    tarotLocked = true;
    const a0 = tarotSpread[tarotChosen[0]];
    const a1 = tarotSpread[tarotChosen[1]];

    if (a0.row === a1.row) {
      // gleiches Aroma → kostenlos neu wählen (kein Abzug)
      hint.classList.add('same');
      hint.textContent = alL().sameEssence;
      setTimeout(resetSelection, 1100);
      return;
    }

    // gültige Geschmackswelt
    chosenAromas = [a0, a1];
    hint.classList.remove('same');
    hint.textContent = alL().revealed;

    // restliche Karten sperren
    tarotSpread.forEach((_, k) => {
      const el = document.getElementById('al-tc-' + k);
      if (el && !el.classList.contains('flipped')) el.classList.add('locked');
    });

    document.getElementById('al-tarot-next').disabled = false;
    const rr = document.getElementById('al-tarot-reroll');
    if (tarotAttemptsLeft > 0) {
      rr.disabled = false;
      rr.textContent = alL().reshuffleN(tarotAttemptsLeft);
    } else {
      rr.disabled = true;
      rr.textContent = alL().noReshuffle;
    }

    // Der magische Moment darf nicht unterhalb des Folds passieren:
    // Ergebnis-Chips sanft in den Viewport holen
    setTimeout(() => {
      const duo = document.querySelector('#al-tarot .al-aroma-duo');
      if (duo && duo.scrollIntoView) duo.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 480);
  };

  // dieselbe Auslage, Auswahl zurücksetzen (kein Versuch verbraucht)
  function resetSelection() {
    tarotChosen.forEach(k => {
      const el = document.getElementById('al-tc-' + k);
      if (el) el.classList.remove('flipped', 'chosen');
    });
    tarotChosen = [];
    tarotLocked = false;
    ['al-aroma-0', 'al-aroma-1'].forEach(id => {
      const chip = document.getElementById(id);
      if (chip) {
        chip.classList.remove('show');
        chip.querySelector('.ac-card').textContent = '—';
        chip.querySelector('.ac-motto').textContent = '';
        chip.querySelector('.ac-flavor').textContent = '—';
      }
    });
    const hint = document.getElementById('al-tarot-hint');
    hint.classList.remove('same');
    hint.textContent = alL().touchFirst;
  }

  window.alRerollTarot = function() {
    if (tarotAttemptsLeft <= 0) return;
    tarotAttemptsLeft--;
    layoutTarot();
  };

  window.alGoD4 = function() {
    rollsLeft = 3;
    buildD4();
    show('d4');
  };

  // ── Screen 3: D4 ──────────────────────────────────────────────
  let d4Value = null;

  function buildD4() {
    const s = document.getElementById('al-d4');
    if (!s) return;
    s.innerHTML = `
      <div class="al-eyebrow">${alL().act3}</div>
      <div class="al-title">${alL().d4Title}</div>
      <div class="al-subtitle">${alL().d4Sub}</div>
      <div class="al-rule"></div>
      <div class="al-d4-wrap">
        <svg id="al-d4-svg" class="al-d4-svg" width="120" height="120" viewBox="0 0 120 120"
             fill="none" onclick="alRollD4()">
          <!-- D4 tetrahedron face projection -->
          <polygon id="al-d4-poly" points="60,10 108,95 12,95" stroke="#D4AF37" stroke-width="1"
                   fill="#0E0E0E" stroke-linejoin="round"/>
          <line x1="60" y1="10" x2="60" y2="95" stroke="rgba(184,150,12,0.2)" stroke-width="0.5"/>
          <line x1="12" y1="95" x2="108" y2="95" stroke="rgba(184,150,12,0.2)" stroke-width="0.5"/>
          <!-- inner highlight -->
          <polygon points="60,28 94,84 26,84" stroke="rgba(184,150,12,0.12)" stroke-width="0.5" fill="none"/>
          <text id="al-d4-face" x="60" y="78" text-anchor="middle"
                font-family="Cinzel,serif" font-size="28" fill="#D4AF37" opacity="0.4">?</text>
        </svg>
      </div>
      <div class="al-result-card${chosenShow ? ' show' : ''}" id="al-d4-result">
        <div class="al-result-name" id="al-d4-rname">${chosenShow ? showName(chosenShow) : '—'}</div>
        <div class="al-result-note" id="al-d4-rnote">${chosenShow ? showNote(chosenShow) : '—'}</div>
      </div>
      <div class="al-reroll-info">
        ${alL().triesLeft}
        <span class="al-reroll-dot" id="al-dd0"></span>
        <span class="al-reroll-dot" id="al-dd1"></span>
        <span class="al-reroll-dot" id="al-dd2"></span>
      </div>
      <div class="al-btn-row">
        <button class="al-btn primary" id="al-d4-roll-btn" onclick="alRollD4()" style="flex:1;">${chosenShow ? (rollsLeft>0?alL().again(rollsLeft):alL().noTries) : alL().roll}</button>
        <button class="al-btn" id="al-d4-next-btn" onclick="alGoFinale()" ${chosenShow?'':'disabled'} style="flex:1;">${alL().next}</button>
      </div>
    `;
    if (d4Value) { const f=document.getElementById('al-d4-face'); f.textContent=d4Value; f.style.opacity='1'; f.style.fill='#D4AF37'; }
    setRerollDots('al-dd', 3 - (rollsLeft === undefined ? 3 : rollsLeft));
    if (chosenShow && rollsLeft<=0) document.getElementById('al-d4-roll-btn').disabled = true;
  }

  let d4Rolling = false;
  window.alRollD4 = function() {
    if (d4Rolling) return;
    const firstRoll = !chosenShow;            // erster Wurf ist frei
    const rollBtn = document.getElementById('al-d4-roll-btn');
    if (!rollBtn || rollBtn.disabled) return;
    d4Rolling = true;
    rollBtn.disabled = true;

    const svg = document.getElementById('al-d4-svg');
    const face = document.getElementById('al-d4-face');
    svg.classList.add('rolling');

    // flash random numbers
    let flashes = 0;
    const flashInterval = setInterval(() => {
      face.textContent = Math.ceil(Math.random() * 4);
      face.style.opacity = '0.6';
      haptic(7);
      flashes++;
      if (flashes >= 8) {
        clearInterval(flashInterval);
        d4Value = Math.ceil(Math.random() * 4);
        face.textContent = d4Value;
        face.style.opacity = '1';
        face.style.fill = '#D4AF37';
        svg.classList.remove('rolling');
        d4Rolling = false;
        haptic([0, 18, 50, 26]);   // D4 trifft

        if (!firstRoll) rollsLeft = Math.max(0, rollsLeft - 1);
        setRerollDots('al-dd', 3 - rollsLeft);

        chosenShow = SHOWS[d4Value - 1];
        const rc = document.getElementById('al-d4-result');
        document.getElementById('al-d4-rname').textContent = showName(chosenShow);
        document.getElementById('al-d4-rnote').textContent = showNote(chosenShow);
        rc.classList.add('show');

        rollBtn.textContent = rollsLeft > 0 ? alL().again(rollsLeft) : alL().noTries;
        rollBtn.disabled = rollsLeft <= 0;
        document.getElementById('al-d4-next-btn').disabled = false;
      }
    }, 120);
  };

  window.alGoFinale = function() {
    buildFinale();
    const sid = chosenShow ? chosenShow.id : null;
    if (sid && typeof window.alPlayShow === 'function') {
      // D4-Screen ausblenden, damit die Show allein die Bühne hat
      root.querySelectorAll('.al-screen').forEach(s => s.classList.remove('active'));
      updateActs('show');
      window.alPlayShow(sid, () => show('finale'));
    } else {
      show('finale');
    }
  };

  // ── Screen 4: Finale ─────────────────────────────────────────
  function saveElixir() {
    try {
      sessionStorage.setItem('alchemistElixir', JSON.stringify({
        base: chosenBase, aromas: chosenAromas,
        show: chosenShow ? chosenShow.id : null, d4: d4Value, free: isFree,
      }));
    } catch (e) {}
    if (typeof updateElixirChip === 'function') updateElixirChip();
  }
  function restoreElixir() {
    try {
      const raw = sessionStorage.getItem('alchemistElixir');
      if (!raw) return false;
      const d = JSON.parse(raw);
      if (!d || !d.base || !d.aromas) return false;
      chosenBase = d.base;
      chosenAromas = d.aromas;
      chosenShow = d.show ? SHOWS[d.show - 1] : null;
      d4Value = d.d4 || null;
      isFree = !!d.free;
      return true;
    } catch (e) { return false; }
  }
  // Gespeichertes Elixier wieder anzeigen (z. B. nach Reload, via Chip)
  window.alShowSavedElixir = function() {
    if (!restoreElixir()) return;
    const st = document.getElementById('ritualStage');
    if (st && !st.classList.contains('open')) {
      // Bühne direkt öffnen — ohne den Intro-Reset von openRitual()
      if (typeof spawnRitualParticles === 'function') spawnRitualParticles();
      st.classList.add('open');
      st.setAttribute('aria-hidden', 'false');
      st.scrollTop = 0;
      if (typeof pushView === 'function') pushView('overlay');
    }
    buildFinale();
    show('finale');
  };

  function buildFinale() {
    const s = document.getElementById('al-finale');
    if (!s) return;
    saveElixir();
    const a0 = chosenAromas ? chosenAromas[0] : null;
    const a1 = chosenAromas ? chosenAromas[1] : null;
    const arkana    = (a0 && a1) ? (cardName(a0) + ' · ' + cardName(a1)) : '—';
    const geschmack = (a0 && a1) ? (cardFlavor(a0) + '<br>' + cardFlavor(a1)) : '—';
    s.innerHTML = `
      <div class="al-glow"></div>
      <div class="al-eyebrow">${alL().finaleEyebrow}</div>
      <div class="al-title">${alL().finaleTitle}</div>
      <div class="al-subtitle">${alL().finaleSub}</div>
      <div class="al-rule"></div>
      <div class="al-elixir-wrap">
        <div class="al-elixir-row">
          <span class="al-elixir-label">${alL().base}</span>
          <span class="al-elixir-value">${baseName(chosenBase)}</span>
        </div>
        <div class="al-elixir-row">
          <span class="al-elixir-label">${alL().arkana}</span>
          <span class="al-elixir-value">${arkana}</span>
        </div>
        <div class="al-elixir-row">
          <span class="al-elixir-label">${alL().flavorWorld}</span>
          <span class="al-elixir-value">${geschmack}</span>
        </div>
        <div class="al-elixir-row">
          <span class="al-elixir-label">${alL().ritual}</span>
          <span class="al-elixir-value">${chosenShow ? showName(chosenShow) : '—'}</span>
        </div>
      </div>
      <div class="al-final-motto">${alL().finalMotto}</div>
      <button class="al-service-btn" onclick="alShowModal()" style="margin-top:6px;">
        ${alL().showService}
      </button>
      <button class="al-btn" onclick="alReset()" style="width:100%;max-width:380px;margin-top:14px;font-size:8px;letter-spacing:2px;">
        ${alL().restart}
      </button>
    `;
  }

  // ── Modal ────────────────────────────────────────────────────
  const modal = document.createElement('div');
  modal.className = 'al-modal-overlay';
  modal.innerHTML = `
    <div class="al-modal">
      <div class="al-modal-title">ALEA IACTA EST</div>
      <div class="al-modal-line">
        <span class="al-modal-lbl" id="al-ml-base">Basis</span>
        <span class="al-modal-val" id="al-m-base">—</span>
      </div>
      <div class="al-modal-line">
        <span class="al-modal-lbl" id="al-ml-flavor">Geschmack</span>
        <span class="al-modal-val" id="al-m-flavor">—</span>
      </div>
      <div class="al-modal-line">
        <span class="al-modal-lbl" id="al-ml-tarot">Arkana</span>
        <span class="al-modal-val" id="al-m-tarot">—</span>
      </div>
      <div class="al-modal-line">
        <span class="al-modal-lbl" id="al-ml-show">Show</span>
        <span class="al-modal-val" id="al-m-show">—</span>
      </div>
      <div class="al-modal-line">
        <span class="al-modal-lbl" id="al-ml-price">Preis</span>
        <span class="al-modal-val" style="color:#7A6308;font-family:'Cinzel',serif;font-size:17px;">19.–</span>
      </div>
      <button class="al-modal-close" onclick="alHideModal()" id="al-modal-close">Schliessen</button>
    </div>
  `;
  root.appendChild(modal);

  window.alShowModal = function() {
    const a0 = chosenAromas ? chosenAromas[0] : null;
    const a1 = chosenAromas ? chosenAromas[1] : null;
    const L = alL();
    document.getElementById('al-ml-base').textContent   = L.base;
    document.getElementById('al-ml-flavor').textContent = L.mFlavor;
    document.getElementById('al-ml-tarot').textContent  = L.arkana;
    document.getElementById('al-ml-show').textContent   = L.mShow;
    document.getElementById('al-ml-price').textContent  = L.mPrice;
    document.getElementById('al-modal-close').textContent = L.close;
    document.getElementById('al-m-base').textContent   = baseName(chosenBase);
    document.getElementById('al-m-flavor').textContent = (a0 && a1) ? (cardFlavor(a0) + ' + ' + cardFlavor(a1)) : '—';
    document.getElementById('al-m-tarot').textContent  = (a0 && a1) ? (cardName(a0) + ' · ' + cardName(a1)) : '—';
    document.getElementById('al-m-show').textContent   = chosenShow ? showName(chosenShow) : '—';
    modal.classList.add('show');
  };
  window.alHideModal = function() { modal.classList.remove('show'); };

  // ── Reset ────────────────────────────────────────────────────
  window.alReset = function() {
    rollsLeft = undefined;
    chosenBase = chosenShow = null;
    chosenAromas = null;
    d4Value = null;
    // Hinweis: das gespeicherte Elixier bleibt erhalten —
    // es wird erst durch ein neues Finale überschrieben.
    buildIntro();
    show('intro');
  };

  // ── Sprachwechsel: aktuellen Screen neu aufbauen ──────────────
  window.alRelang = function() {
    const stage = document.getElementById('ritualStage');
    if (!stage || !stage.classList.contains('open')) {
      // Ritual ist nicht offen — Intro im Hintergrund neu aufbauen genügt
      buildIntro();
      return;
    }
    if (alScreen === 'intro')      buildIntro();
    else if (alScreen === 'wheel') buildWheel();
    else if (alScreen === 'tarot') renderTarotScreen();   // Auswahl & Spread bleiben erhalten
    else if (alScreen === 'd4')    buildD4();
    else if (alScreen === 'finale')buildFinale();
    // aktiven Screen sichtbar halten
    root.querySelectorAll('.al-screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('al-' + alScreen);
    if (el) el.classList.add('active');
    if (modal.classList.contains('show')) window.alShowModal();
  };

  // ── Create placeholder screens for tarot/d4/finale ───────────
  screen('tarot',  '');
  screen('d4',     '');
  screen('finale', '');

  // Start
  show('intro');
  // draw wheel lazily when wheel screen becomes active
  const wheelObs = new MutationObserver(() => {
    const w = document.getElementById('al-wheel-canvas');
    if (w) { drawWheel(); wheelObs.disconnect(); }
  });
  wheelObs.observe(root, { childList:true, subtree:true });
}

// Initialer aktiver Sprachstatus im Switcher
if (typeof refreshLangSwitch === 'function') refreshLangSwitch();

// ════════════════════════════════════════════════════════════════
// HISTORY / BACK-BUTTON / DEEP-LINKS
// Systemgeste "Zurück" schliesst zuerst Overlays, dann das Buch —
// statt die ganze Karte zu verlassen. #kapitel-Links öffnen direkt.
// ════════════════════════════════════════════════════════════════
function pushView(level) { try { history.pushState({ codex: level }, ''); } catch (e) {} }

const HASH_MAP = {
  toc:'__TOC__', inhalt:'__TOC__',
  ritual:'__PORTAL__', alea:'__PORTAL__',
  synthese:'__SYNTHESE__', rebis:'__REBIS__',
  surrepo:'__SURREPO__', sirup:'__SURREPO__',
  vinum:'__VINUM__', weine:'__VINUM__', wine:'__VINUM__',
  spirituum:'__SPIRITUUM__', cervisia:'__CERVISIA__', bier:'__CERVISIA__', beer:'__CERVISIA__',
  capulus:'__CAPULUS__', kaffee:'__CAPULUS__', coffee:'__CAPULUS__',
  thea:'__THEA__', tee:'__THEA__', tea:'__THEA__',
  cibus:'__SNACKS__', snacks:'__SNACKS__',
};
function hashForMarker(marker) {
  for (const [h, m] of Object.entries(HASH_MAP)) if (m === marker) return h;
  return '';
}
// Aktuelles Kapitel in die URL spiegeln (teilbar, Reload-sicher) — ohne neuen History-Eintrag
function reflectHash() {
  try {
    const idx = spread * 2 + (isMobileBook() ? mobileSide : 0);
    const h = hashForMarker(PAGES[idx]) || hashForMarker(PAGES[spread * 2]) || hashForMarker(PAGES[spread * 2 + 1]);
    if (h && !landingVisible()) history.replaceState(history.state, '', '#' + h);
  } catch (e) {}
}

(function wireHistory() {
  const pairs = [
    ['openRitual', 'closeRitual'], ['openSyntheseRecipe', 'closeSynthese'],
    ['openRebis', 'closeRebis'], ['openSurrepo', 'closeSurrepo'],
    ['openVinum', 'closeVinum'], ['openCervisia', 'closeCervisia'],
    ['openFusione', 'closeFusione'],
  ];
  const rawClose = {};
  pairs.forEach(([o, c]) => {
    const rawOpen = window[o];
    rawClose[c] = window[c];
    window[o] = function (...args) { rawOpen.apply(this, args); pushView('overlay'); };
    window[c] = function () {
      if (history.state && history.state.codex === 'overlay') history.back();
      else rawClose[c]();
    };
  });

  const STAGE_CLOSE = {
    ritualStage: 'closeRitual', syntheseStage: 'closeSynthese', rebisStage: 'closeRebis',
    surrepoStage: 'closeSurrepo', vinumStage: 'closeVinum', cervisiaStage: 'closeCervisia',
    fusioneStage: 'closeFusione',
  };
  window.addEventListener('popstate', function () {
    for (const [id, fn] of Object.entries(STAGE_CLOSE)) {
      const el = document.getElementById(id);
      if (el && el.classList.contains('open')) { rawClose[fn](); return; }
    }
    if (!landingVisible()) closeCodexInternal();
  });
})();

// ── Initialisierung: Sprache, Deep-Link, Wiederkehrer ────────────
(function initEntry() {
  // Sprache: ?lang=en|de → gemerkte Sprache → Default DE
  let lang = null;
  try { lang = new URLSearchParams(location.search).get('lang') || sessionStorage.getItem('codexLang'); } catch (e) {}
  if ((lang === 'en' || lang === 'de') && typeof setCodexLang === 'function' && lang !== CODEX_LANG) {
    setCodexLang(lang);
  }
  const hashKey = (location.hash || '').replace('#', '').toLowerCase();
  const marker = HASH_MAP[hashKey];
  let seen = false;
  try { seen = sessionStorage.getItem('codexSeen') === '1'; } catch (e) {}
  if (marker || seen) {
    // Direkt ins aufgeschlagene Buch — ohne Öffnungsanimation
    setTimeout(() => skipLanding(marker || null), 10);
  }
})();
</script>
